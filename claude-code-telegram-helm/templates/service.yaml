{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    app: claude-bot
spec:
  selector:
    app: claude-bot
  ports:
  - name: webhook
    port: 80
    targetPort: 8080
    protocol: TCP
{{- end }}
