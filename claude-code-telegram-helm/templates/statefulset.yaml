apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: {{ .Release.Name }}
  replicas: 1
  selector:
    matchLabels:
      app: claude-bot
  template:
    metadata:
      labels:
        app: claude-bot
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: bot
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        env:
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.env.telegramSecretName }}
              key: TELEGRAM_BOT_TOKEN
        - name: ALLOWED_USERS
          valueFrom:
            secretKeyRef:
              name: {{ .Values.env.telegramSecretName }}
              key: ALLOWED_USERS
        - name: GH_APP_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.env.telegramSecretName }}
              key: GH_APP_ID
        - name: GH_INSTALLATION_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.env.telegramSecretName }}
              key: GH_INSTALLATION_ID
        - name: TELEGRAM_BOT_USERNAME
          value: {{ .Values.env.botUsername | quote }}
        - name: APPROVED_DIRECTORY
          value: {{ .Values.env.approvedDirectory | quote }}
        - name: WORK_DIR
          value: {{ .Values.env.workDir | quote }}
        - name: CLAUDE_TIMEOUT_SECONDS
          value: {{ .Values.env.claudeTimeoutSeconds | quote }}
        - name: PYTHONPATH
          value: "/app"
        - name: XDG_CONFIG_HOME
          value: "/data/.config"
        lifecycle:
          postStart:
            exec:
              command: 
                - "/bin/sh"
                - "-c"
                - >
                  mkdir -p /data/.claude && 
                  ln -sf /data/.claude /root/.claude
        volumeMounts:
        - name: storage
          mountPath: /data
        - name: github-key
          mountPath: /etc/github
          readOnly: true
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
      volumes:
      - name: github-key
        secret:
          secretName: github-app-key
  volumeClaimTemplates:
  - metadata:
      name: storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: {{ .Values.persistence.storageClass }}
      resources:
        requests:
          storage: {{ .Values.persistence.size }}
