image:
  # Format: <region>.ocir.io/<tenancy-namespace>/<image-name>
  # Override at deploy time: helm upgrade ... --set image.repository=<your-registry>/<your-namespace>/claude-code-telegram
  repository: "<region>.ocir.io/<tenancy-namespace>/claude-code-telegram"
  tag: "latest"
  pullPolicy: Always

env:
  telegramSecretName: "bot-secrets"
  workDir: "/data/workspace"
  botUsername: "Jemmy8oyCCTBot"
  approvedDirectory: "/data/workspace"
  claudeTimeoutSeconds: "1200"

persistence:
  storageClass: "oci-bv"
  size: 50Gi

webhook:
  enabled: true
  host: "balenthiran.co.uk"  # same host as the main site; /webhooks path routes to the bot
  # Reuse the existing TLS secret managed by the balenthiranhelm release.
  # No cert-manager annotation here — cert-manager already owns this secret
  # and adding the annotation would cause a duplicate certificate conflict.
  tlsSecretName: "balenthiran-tls"
  annotations: {}
